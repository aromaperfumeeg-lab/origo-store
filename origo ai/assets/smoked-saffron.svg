<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" role="img" aria-labelledby="title">
  <title id="title">ORIGO Smoked Saffron perfume bottle</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2c1713"/>
      <stop offset=".45" stop-color="#a4582d"/>
      <stop offset="1" stop-color="#e6b26b"/>
    </linearGradient>
    <linearGradient id="glass" x1=".1" y1="0" x2=".9" y2="1">
      <stop stop-color="#e7aa55" stop-opacity=".92"/>
      <stop offset=".28" stop-color="#6e251c" stop-opacity=".94"/>
      <stop offset=".72" stop-color="#291111"/>
      <stop offset="1" stop-color="#9a4b29"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="1" y2="0">
