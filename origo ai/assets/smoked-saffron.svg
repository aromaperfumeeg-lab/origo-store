    <rect x="345" y="122" width="210" height="174" rx="20" fill="url(#cap)"/>
    <rect x="373" y="91" width="154" height="54" rx="6" fill="#120e0d"/>
    <path d="M239 278h422l42 92v491c0 52-42 94-94 94H291c-52 0-94-42-94-94V370Z" fill="url(#glass)" stroke="#f2c889" stroke-opacity=".35" stroke-width="8"/>
