    <ellipse cx="770" cy="370" rx="125" ry="260" fill="url(#petal)" transform="rotate(31 770 370)"/>
    <ellipse cx="748" cy="930" rx="165" ry="285" fill="url(#petal)" transform="rotate(67 748 930)"/>
