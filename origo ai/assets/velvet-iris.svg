    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#411225"/>
      <stop offset=".38" stop-color="#160c13"/>
      <stop offset=".72" stop-color="#72223e"/>
      <stop offset="1" stop-color="#12090f"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
