<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" role="img" aria-labelledby="title">
  <title id="title">ORIGO Velvet Iris perfume bottle</title>
  <defs>
    <linearGradient id="bg" x1=".1" y1="0" x2=".9" y2="1">
      <stop stop-color="#efe4dc"/>
      <stop offset=".5" stop-color="#d3b2b8"/>
